# ============================================================================
# Process Configuration: Mortgage / Home-Loan Origination
# ============================================================================
# Publication-grade demo dataset for the mining-lib showcase pages.
# Lands six named variants (one happy path, a re-underwrite loop, three
# terminal outcomes, and a resource-level bottleneck) so every shipped
# feature — variant filter, time/amber encoding, terminal-node durations,
# resource breakdown, case-attribute filter, date-range filter, trace
# pin — has something visible to show on this data.
#
# Reads with `emit_labels: true` so the emitted concept:name + org:resource
# strings are human-readable Title Case (the v1.2.0 ProcessLog feature).
# ============================================================================

process_name: "Loan Origination"
description: |
  Mortgage / home-loan origination from application through funding,
  with a re-underwrite document-cycle loop and three terminal outcomes.

  Six named variants emerge from the probability tree:
  1. Direct Funding (~52%)        — happy path, no loop, no decline
  2. Re-underwrite Loop (~17%)    — one or more underwriting revisits, then funded
  3. Decline at Underwriting (~12%) — any underwriting visit ends in decline
  4. Early Credit Decline (~6%)   — credit check declines before underwriting
  5. Withdrawn at Doc Request (~7%) — applicant withdraws during doc cycle
  6. Appraisal Decline (~5%)      — property appraisal declines

  Bottleneck: the `documents_received -> underwriting` edge gets a
  deliberately wide duration range (72-336 h) so the amber time
  encoding lights it up. Resource bottleneck: Rachel Greene
  (underwriter) is slow + inconsistent + high-capacity — visible in
  the per-node resource breakdown on any Underwriting selection.

num_cases: 2500
seed: 42

start_date: "2025-01-01"
end_date: "2025-06-30"
timezone: "America/New_York"
time_granularity: "seconds"

# Phase 35 — emit human-readable activity + resource strings.
emit_labels: true

working_hours:
  enabled: true
  days: [Monday, Tuesday, Wednesday, Thursday, Friday]
  start_time: "09:00"
  end_time: "17:00"
  holidays:
    - "2025-01-01"  # New Year's Day
    - "2025-01-20"  # MLK Jr. Day
    - "2025-02-17"  # Presidents' Day
    - "2025-05-26"  # Memorial Day
    # Later 2025 holidays omitted — intake ends 2025-06-30, all cases
    # complete well before Independence Day.

# ----------------------------------------------------------------------------
# Activities (13)
# ----------------------------------------------------------------------------
activities:
  - step: 1
    id: application_submitted
    name: "Application Submitted"
    description: "Borrower submits the loan application online or via broker"
    type: automatic
    duration:
      min: 2
      max: 24       # 2-24 hours — intake batching
    next_steps:
      - activity: credit_check
        probability: 1.0

  - step: 2
    id: credit_check
    name: "Credit Check"
    description: "Automated credit pull and basic eligibility scoring"
    type: automatic
    duration:
      min: 1
      max: 12       # automated, sub-day
    next_steps:
      # 6% — Early Credit Decline variant
      - activity: declined
        probability: 0.06
      - activity: document_collection
        probability: 0.94

  - step: 3
    id: document_collection
    name: "Document Collection"
    description: "Processor gathers income, asset, and identity documents"
    type: human
    resource_pool: processors
    duration:
      min: 24
      max: 96       # 1-4 days
    next_steps:
      - activity: initial_review
        probability: 1.0

  - step: 4
    id: initial_review
    name: "Initial Review"
    description: "Processor reviews documents for completeness and consistency"
    type: human
    resource_pool: processors
    duration:
      min: 24
      max: 72       # 1-3 days
    next_steps:
      - activity: underwriting
        probability: 1.0

  - step: 5
    id: underwriting
    name: "Underwriting"
    description: "Underwriter evaluates credit, capacity, and collateral risk"
    type: human
    resource_pool: underwriters
    duration:
      min: 48
      max: 192      # 2-8 days — wide; this is where Rachel Greene's profile bites
    next_steps:
      # On each underwriting visit (re-rolled on returns from the loop):
      # 60% -> property_appraisal (Direct Funding path on first visit)
      # 30% -> request_documents (enters the re-underwrite loop)
      # 10% -> declined (Decline at Underwriting variant)
      - activity: property_appraisal
        probability: 0.60
      - activity: request_documents
        probability: 0.30
      - activity: declined
        probability: 0.10

  - step: "5a"
    id: request_documents
    name: "Request Additional Documents"
    description: "System notifies the borrower that more documents are needed"
    type: automatic
    duration:
      min: 24
      max: 168      # 1-7 days for the notification + queue
    next_steps:
      # 80% -> documents_received (loop continues)
      # 20% -> withdrawn (Withdrawn at Doc Request variant)
      - activity: documents_received
        probability: 0.80
      - activity: withdrawn
        probability: 0.20

  - step: "5b"
    id: documents_received
    name: "Documents Received"
    description: "Borrower submits the requested documents; queued for re-underwriting"
    type: automatic
    duration:
      min: 72
      max: 336      # 3-14 days — THE LONG POLE (deliberately wide for amber)
    next_steps:
      - activity: underwriting
        probability: 1.0

  - step: 6
    id: property_appraisal
    name: "Property Appraisal"
    description: "Appraiser inspects the property and submits the valuation report"
    type: human
    resource_pool: appraisers
    duration:
      min: 24
      max: 168      # 1-7 days, scheduling-heavy
    next_steps:
      # 93% -> conditional_approval (valuation supports the loan)
      # 7%  -> declined (Appraisal Decline variant — value below threshold)
      - activity: conditional_approval
        probability: 0.93
      - activity: declined
        probability: 0.07

  - step: 7
    id: conditional_approval
    name: "Conditional Approval"
    description: "System issues a conditional approval with closing requirements"
    type: automatic
    duration:
      min: 1
      max: 8        # fast automated step
    next_steps:
      - activity: clear_to_close
        probability: 1.0

  - step: 8
    id: clear_to_close
    name: "Clear to Close"
    description: "Underwriter signs off on the final closing package"
    type: human
    resource_pool: underwriters
    duration:
      min: 12
      max: 72       # 0.5-3 days
    next_steps:
      - activity: loan_funded
        probability: 1.0

  # Terminal states ----------------------------------------------------------

  - step: "9a"
    id: loan_funded
    name: "Loan Funded"
    description: "Funds disbursed; loan is closed and active"
    type: final
    duration:
      min: 4
      max: 24       # closure paperwork window
    next_steps: []

  - step: "9b"
    id: declined
    name: "Declined"
    description: "Application denied at credit, underwriting, or appraisal"
    type: final
    duration:
      min: 4
      max: 48
    next_steps: []

  - step: "9c"
    id: withdrawn
    name: "Withdrawn"
    description: "Borrower withdraws the application before a final decision"
    type: final
    duration:
      min: 1
      max: 24
    next_steps: []

# ----------------------------------------------------------------------------
# Resources (10 named people across 3 pools)
# ----------------------------------------------------------------------------
resource_pools:
  processors:
    - id: processor_001
      name: "Priya Nair"
      speed: 0.8       # 20% faster than baseline
      consistency: 0.9
      capacity: 1.0
      # Fast, consistent — handles standard intake at a steady pace.

    - id: processor_002
      name: "Marcus Bell"
      speed: 1.0
      consistency: 1.0
      capacity: 1.0
      # Textbook baseline performer.

    - id: processor_003
      name: "Sofia Romano"
      speed: 1.15      # 15% slower
      consistency: 0.85
      capacity: 1.3    # Carries 30% more volume
      # Slightly slower but high throughput — clears the queue.

  underwriters:
    - id: underwriter_001
      name: "Daniel Osei"
      speed: 0.75      # 25% faster — senior expert
      consistency: 0.9
      capacity: 0.9
      # Fast and selective — handles the trickiest files quickly.

    - id: underwriter_002
      name: "Rachel Greene"
      speed: 1.4       # 40% slower
      consistency: 0.6 # high variance (±40% swing)
      capacity: 1.5    # Carries 50% more volume
      # THE BOTTLENECK: slow + inconsistent + high capacity. Most cases
      # touch Rachel at some point; her speed/consistency profile is
      # what surfaces as the long-pole edge on Underwriting in time
      # mode + the largest slice in the per-node resource breakdown.

    - id: underwriter_003
      name: "Hiroshi Tanaka"
      speed: 1.0
      consistency: 1.0
      capacity: 1.0
      # Textbook baseline.

    - id: underwriter_004
      name: "Lena Kowalski"
      speed: 1.1       # 10% slower
      consistency: 0.85
      capacity: 1.2    # 20% more volume
      # Methodical, slightly slower, higher load.

  appraisers:
    - id: appraiser_001
      name: "Tom Fletcher"
      speed: 0.85      # 15% faster
      consistency: 0.7 # high variance (site-dependent)
      capacity: 1.0
      # Fast but variable — depends heavily on property condition.

    - id: appraiser_002
      name: "Aisha Khan"
      speed: 1.25      # 25% slower
      consistency: 0.95
      capacity: 1.1
      # Slow but very consistent — thorough comparable-sales analysis.

    - id: appraiser_003
      name: "Diego Morales"
      speed: 1.0
      consistency: 1.0
      capacity: 0.9
      # Baseline, slightly lower volume.

# ----------------------------------------------------------------------------
# Event attributes (event-level, varies per event)
# ----------------------------------------------------------------------------
event_attributes:
  - name: cost:amount
    type: float
    description: "Processing / labor cost per event in USD"
    generation:
      distribution: normal
      mean: 120.0      # mortgage-scale processing cost
      std: 40.0
      min: 20.0
      max: 600.0
    # Only emitted on human activities (automatic rows carry no cost).
    apply_to_types: [human]

# ----------------------------------------------------------------------------
# Case attributes (case-level, same for every event in a case)
# ----------------------------------------------------------------------------
# Five attributes covering purpose / channel / region / size / segment.
# Sorted alphabetically here for readability; the exported column order
# is alphabetical-within-scope per LOG_FORMAT_SPEC v1.1 regardless.
case_attributes:
  - name: case:applicant_segment
    type: string
    values: ["first_time_buyer", "repeat_buyer", "investor"]
    probabilities: [0.40, 0.45, 0.15]
    description: "Borrower experience profile"

  - name: case:channel
    type: string
    values: ["online", "broker", "branch"]
    probabilities: [0.50, 0.30, 0.20]
    description: "Origination channel"

  - name: case:loan_amount_band
    type: string
    values: ["under_250k", "250k_500k", "500k_750k", "over_750k"]
    probabilities: [0.30, 0.40, 0.20, 0.10]
    description: "Loan principal amount bucket"

  - name: case:loan_purpose
    type: string
    values: ["purchase", "refinance", "cash_out_refinance"]
    probabilities: [0.55, 0.30, 0.15]
    description: "Why the borrower is taking out the loan"

  - name: case:region
    type: string
    values: ["west", "south", "northeast", "midwest"]
    probabilities: [0.30, 0.28, 0.22, 0.20]
    description: "US region of the property"

# ----------------------------------------------------------------------------
# Anomalies — kept structurally identical to the permit config for
# parity. NOTE: fatigue / random_delays / peak_times are config-validated
# but NOT implemented in ProcessLog v1.2.0 (Phase 33 audit). Realism in
# this dataset comes entirely from duration spread + resource speed +
# consistency. This block is preserved so that when those features land
# upstream in a future release, the config picks them up automatically.
# ----------------------------------------------------------------------------
anomalies:
  enabled: true
  random_delays:
    enabled: true
    probability: 0.05
    multiplier_min: 2.0
    multiplier_max: 4.0
  peak_times:
    enabled: true
    probability: 0.30
    slowdown_factor: 1.1
  resource_fatigue:
    enabled: true
    max_slowdown: 0.30
    fatigue_threshold: 50

# ----------------------------------------------------------------------------
# Output
# ----------------------------------------------------------------------------
output:
  formats: [csv, parquet, json, xes]
  directory: "./out"
  file_prefix: "loan_events"
  generate_samples: false
  include_metadata: true

# ============================================================================
# END OF CONFIGURATION
# ============================================================================
